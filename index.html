<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IPTV Manager PRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
<input type="text" id="fileInput" placeholder="Ej: lista1.m3u">

</html>
